services:
  # Frontend service
  frontend:
    build:
      context: services/client
      dockerfile: Dockerfile
    image: deval/frontend:latest
    ports:
      # Caddy on the host terminates public TLS and reverse-proxies to the app,
      # which nginx serves on :9000 (ssl). Port 80 is redirect-only, so Caddy
      # must target 9000 — pointing it at 80 causes an infinite HTTP->HTTPS loop.
      - "127.0.0.1:9000:9000"
    environment:
      - SERVER_URL=http://backend:5000
      - DOMAIN=localhost
      - PORT=9000
      - IGNORE=$
    volumes:
      - /opt/crest/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist_prod:/usr/share/nginx/html # share static files with nginx
      - nginx_logs:/var/log/nginx
      # Real TLS cert/key for the App Gateway -> backend HTTPS hop (kept out of the git repo).
      # Overrides the expired self-signed placeholder baked into the image.
      - /opt/crest/ssl/nginx.crt:/etc/nginx/conf.d/ssl/nginx.crt:ro
      - /opt/crest/ssl/nginx.key:/etc/nginx/conf.d/ssl/nginx.key:ro
    networks:
      - app-network
    restart: always

  # Backend service
  backend:
    build:
      context: services/server
      dockerfile: Dockerfile.prod
    image: deval/backend:latest
    volumes:
      - /opt/crest/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_data_prod:/home/app/var/lib/app_data
      - gunicorn_logs:/var/log/gunicorn
    ports:
      - 5001:5000
    env_file:
      - env/.env.prod
    environment:
      - SERVICE_NAME=backend
      - CELERY_BROKER_URL=redis://default:Ey%402026%21@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://default:Ey%402026%21@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      - redis
      - mssql
      - minio
    networks:
      - app-network
    restart: always

  # Celery worker service
  worker:
    build:
      context: services/server
      dockerfile: Dockerfile.prod
    image: deval/backend:latest
    volumes:
      - /opt/crest/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_data_prod:/home/app/var/lib/app_data
    depends_on:
      - redis
      - backend
      - minio
    env_file:
      - env/.env.prod
    environment:
      - SERVICE_NAME=worker
      - CELERY_BROKER_URL=redis://default:Ey%402026%21@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://default:Ey%402026%21@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    networks:
      - app-network
    restart: always

  export-worker:
    build:
      context: services/server
      dockerfile: Dockerfile.prod
    image: deval/backend:latest
    volumes:
      - backend_data_prod:/home/app/var/lib/app_data
    depends_on:
      - redis
      - backend
      - minio
    env_file:
      - env/.env.prod
    environment:
      - SERVICE_NAME=export-worker
      - CELERY_BROKER_URL=redis://default:Ey%402026%21@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://default:Ey%402026%21@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    networks:
      - app-network
    restart: always

  beat:
    build:
      context: services/server
      dockerfile: Dockerfile.prod
    image: deval/backend:latest
    depends_on:
      - redis
      - backend
    env_file:
      - env/.env.prod
    environment:
      - SERVICE_NAME=beat
      - CELERY_BROKER_URL=redis://default:Ey%402026%21@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://default:Ey%402026%21@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    networks:
      - app-network
    restart: always

  # Remote MCP server (streamable-http). Not published directly — the nginx/
  # Caddy ingress terminates TLS and reverse-proxies /mcp to this service on the
  # app-network. Secrets come from env/.env.prod:
  #   MCP_AUTH_TOKEN  (required — fails closed without it)
  #   MCP_IDENTITY    (an existing users.email; triggered_by on launched runs)
  #   MCP_ALLOWED_HOSTS  (public hostname(s) the ingress forwards as Host)
  mcp:
    build:
      context: services/server
      dockerfile: Dockerfile.prod
    image: deval/backend:latest
    volumes:
      - backend_data_prod:/home/app/var/lib/app_data
    env_file:
      - env/.env.prod
    environment:
      - SERVICE_NAME=mcp
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8090
      # DNS-rebinding protection stays ON in prod — set MCP_ALLOWED_HOSTS in
      # env/.env.prod. Do NOT set MCP_DISABLE_DNS_REBINDING_PROTECTION here.
      - CELERY_BROKER_URL=redis://default:Ey%402026%21@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://default:Ey%402026%21@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      - redis
      - mssql
      - minio
      - backend
    networks:
      - app-network
    restart: always

  # Redis service
  redis:
    image: 'redis:alpine'
    environment:
      - REDIS_USER=default
      - REDIS_PASSWORD=Ey@2026!
    command: ["redis-server", "--requirepass", "Ey@2026!"]
    networks:
      - app-network
    restart: always

  # DB service
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Supersecret@123!
      - MSSQL_PID=Developer
      - MSSQL_MEMORY_LIMIT_MB=2048
    ports:
      - "1433:1433"  # Expose MSSQL default port
    volumes:
      - /opt/crest/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - mssql_data_prod:/var/opt/mssql  # Persistent storage
    networks:
      - app-network
    restart: always
    mem_limit: 3g

  # Object storage (artifacts/files)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9100:9000"   # S3 API
      - "9101:9001"   # web console
    volumes:
      - /opt/crest/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - minio_data_prod:/data
    networks:
      - app-network
    restart: always

volumes:
  mssql_data_prod:
  frontend_dist_prod:
  backend_data_prod:
  gunicorn_logs:
  nginx_logs:
  minio_data_prod:

networks:
  app-network:
    driver: bridge
