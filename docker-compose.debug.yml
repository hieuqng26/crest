services:
  backend:
    build:
      context: services/server
      dockerfile: Dockerfile
    image: mst-dev/backend:latest
    volumes:
      - backend_data:/var/lib/app_data
    ports:
      - 5001:5000
      - 5678:5678
    env_file:
      - env/.env.dev
    environment:
      - SERVICE_NAME=backend
      - DEBUG_PORT=5678
      - CELERY_BROKER_URL=redis://default:Ey%40123%21@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://default:Ey%40123%21@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      - redis
      - mssql
      - minio
    networks:
      - app-network
    restart: always

  worker:
    image: mst-dev/backend:latest
    volumes:
      - backend_data:/var/lib/app_data
    ports:
      - 5679:5679
    env_file:
      - env/.env.dev
    environment:
      - SERVICE_NAME=worker
      - DEBUG_PORT=5679
      - CELERY_BROKER_URL=redis://default:Ey%40123%21@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://default:Ey%40123%21@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      - redis
      - backend
    networks:
      - app-network
    restart: always

  mcp:
    image: mst-dev/backend:latest
    env_file:
      - env/.env.dev
    environment:
      - SERVICE_NAME=mcp
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8090
      # Fails closed without a token. Supply a strong secret in prod (this dev
      # default is a placeholder — override MCP_AUTH_TOKEN in your shell/.env).
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-dev-mcp-token-change-me}
      # triggered_by on launched runs — must be an existing users.email.
      - MCP_IDENTITY=${MCP_IDENTITY:-admin}
      # Dev convenience: the published localhost port sends Host: localhost.
      # In prod, DROP this and set MCP_ALLOWED_HOSTS to your public hostname(s).
      - MCP_DISABLE_DNS_REBINDING_PROTECTION=true
      - CELERY_BROKER_URL=redis://default:Ey%40123%21@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://default:Ey%40123%21@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    ports:
      - "8090:8090"
    depends_on:
      - redis
      - mssql
      - minio
      - backend
    networks:
      - app-network
    restart: always

  redis:
    image: redis:alpine
    command: ["redis-server", "--requirepass", "Ey@123!"]
    environment:
      - REDIS_USER=default
      - REDIS_PASSWORD=Ey@123!
    networks:
      - app-network
    restart: always

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Supersecret@123!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - app-network
    restart: always

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network
    restart: always


volumes:
  backend_data:
  mssql_data:
  minio_data:

networks:
  app-network:
    driver: bridge
