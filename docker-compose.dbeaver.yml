services:
  # DBeaver service
  dbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: dbeaver
    ports:
      - "8978:8978"  # Web UI port
    environment:
      - CB_SERVER_NAME=DBeaver
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge


